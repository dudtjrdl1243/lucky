  ["사자자리", "🦁", 7, 23, "타고난 주인공 기질의 소유자예요. 당당함과 따뜻한 카리스마로 사람들을 끌어모으고, 베풀 때 가장 빛납니다."],
  ["처녀자리", "🌾", 8, 23, "디테일의 왕, 완벽주의 실력자예요. 남들이 놓치는 부분까지 챙기는 섬세함으로 어디서든 신뢰를 얻습니다."],
  ["천칭자리", "⚖️", 9, 23, "균형 감각과 미적 센스를 타고난 조율의 달인이에요. 우아한 매너로 갈등을 부드럽게 풀어내는 재주가 있습니다."],
  ["전갈자리", "🦂", 10, 23, "깊은 집중력과 강렬한 열정을 지닌 승부사예요. 쉽게 마음을 열지 않지만, 한번 마음을 주면 끝까지 함께합니다."],
  ["사수자리", "🏹", 11, 23, "낙천적이고 모험을 사랑하는 탐험가예요. 더 넓은 세상을 향한 호기심이 인생을 풍요롭게 만듭니다."],
  ["염소자리", "🐐", 12, 22, "묵묵히 정상을 향해 오르는 성실한 야망가예요. 시간이 걸려도 반드시 목표를 이루는 대기만성형입니다."]
];

function getZodiac(m, d) {
  // 시작일 기준으로 역순 탐색 (염소자리는 12/22~1/19라 연말·연초에 걸침)
  for (let i = ZODIAC.length - 1; i >= 0; i--) {
    const z = ZODIAC[i];
    if (m > z[2] || (m === z[2] && d >= z[3])) return z;
  }
  return ZODIAC[ZODIAC.length - 1]; // 1월 1일~19일 → 염소자리
}

function tell() {
  const bd = document.getElementById("bd").value;
  if (!bd) { alert("생년월일을 입력해 주세요!"); return; }
  const [y, m, d] = bd.split("-").map(Number);

  const stem = STEMS[(y - 4) % 10];
  const branch = BRANCHES[(y - 4) % 12];

  document.getElementById("pHanja").textContent = stem[1] + branch[1];
  document.getElementById("pRead").textContent = y + "년 " + stem[0] + branch[0] + "년생";
  document.getElementById("pBadge").textContent =
    branch[3] + " " + stem[3] + " " + branch[2] + "의 해에 태어났어요";

  document.getElementById("ttiText").textContent =
    branch[3] + " " + branch[2] + "띠 — " + TTI_TEXT[branch[2]];
  document.getElementById("ohaengText").textContent = OHAENG_TEXT[stem[2]];
  document.getElementById("yearText").textContent = YEAR2026_TEXT[stem[2]];

  const hr = Number(document.getElementById("hr").value);
  const showHour = hr >= 0;
  document.getElementById("hourLabel").style.display = showHour ? "block" : "none";
  document.getElementById("hourText").style.display = showHour ? "block" : "none";
  if (showHour) {
    const hb = BRANCHES[hr];
    document.getElementById("hourText").textContent =
      hb[0] + "시(" + hb[3] + " " + hb[2] + "의 시간)에 태어난 당신 — " + HOUR_TEXT[hb[2]];
  }

  const z = getZodiac(m, d);
  document.getElementById("starText").textContent = z[1] + " " + z[0] + " — " + z[4];

  const res = document.getElementById("res");
  res.classList.add("show");
  res.scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>
