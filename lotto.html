<script src="lucky-items.js"></script>
<script>
let gameCount = 1;

const OMENS = [
  "이 번호를 뽑는 순간, 어디선가 네 잎 클로버가 피어났습니다 🍀",
  "오늘 밤 꿈에 돼지가 나오면 진짜입니다 🐷",
  "우주의 기운 78%가 이 번호에 응축되었습니다 ✨",
  "번호보다 중요한 건 오늘 하루의 행운! 이미 좋은 일이 오고 있어요 🌈",
  "당첨되면 저를 기억해 주세요... 농담입니다, 행운을 빌어요! 😄",
  "행운은 준비된 사람에게 옵니다. 준비 완료! 🎯",
  "이 조합, 왠지 느낌이 좋은데요? 🔮",
  "숫자들이 유난히 반짝이며 굴러 나왔습니다 ⭐"
];

function setGames(n) {
  gameCount = n;
  document.querySelectorAll("#modes button").forEach(b =>
    b.classList.toggle("sel", b.textContent === n + "게임"));
}

function ballClass(n) {
  return n <= 10 ? "b1" : n <= 20 ? "b2" : n <= 30 ? "b3" : n <= 40 ? "b4" : "b5";
}

function drawSix() {
  const pool = Array.from({ length: 45 }, (_, i) => i + 1);
  const nums = [];
  for (let i = 0; i < 6; i++) {
    nums.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  return nums.sort((a, b) => a - b);
}

function roll() {
  let html = "";
  for (let g = 0; g < gameCount; g++) {
    const nums = drawSix();
    html += '<div class="game-row"><span class="gname">' + String.fromCharCode(65 + g) + " 게임</span>";
    nums.forEach((n, i) => {
      html += '<span class="ball ' + ballClass(n) + '" style="animation-delay:' +
              ((g * 6 + i) * 0.1).toFixed(1) + 's">' + n + "</span>";
    });
    html += "</div>";
  }
  document.getElementById("games").innerHTML = html;
  document.getElementById("omen").textContent = OMENS[Math.floor(Math.random() * OMENS.length)];
  const available = LOTTO_PRODUCTS.filter(p => p.url);
  if (available.length) {
    renderLuckyShop("luckyShop", available[Math.floor(Math.random() * available.length)], "🧧 당첨 기원 행운템");
  }

  const res = document.getElementById("res");
  res.classList.add("show");
  res.scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>
