name: 오늘의 특가 자동 갱신

on:
  schedule:
    - cron: "10 22 * * *" # 매일 KST 07:10 (특가 + 로또 갱신)
    - cron: "40 12 * * 6" # 토요일 KST 21:40 (로또 추첨 직후)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 골드박스 데이터 갱신
        continue-on-error: true
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
        run: python scripts/update_deals.py

      - name: 로또 당첨번호 갱신
        continue-on-error: true
        run: python scripts/update_lotto.py

      - name: 로또 추천번호 생성·채점
        continue-on-error: true
        run: python scripts/update_lotto_stats.py

      - name: 텔레그램 특가 포스팅 (설정 시)
        if: github.event.schedule != '40 12 * * 6'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/post_telegram.py

      - name: 스레드 운세 티저 포스팅 (설정 시)
        if: github.event.schedule != '40 12 * * 6'
        continue-on-error: true
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python scripts/post_threads.py

      - name: 변경사항 커밋
        if: always()
        run: |
          git config user.name "deals-bot"
          git config user.email "actions@users.noreply.github.com"
          git add deals-data.js lotto-data.js lotto-result.html lotto-picks.js lotto-history.json
          git diff --cached --quiet || git commit -m "특가/로또 자동 갱신 $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          git push
