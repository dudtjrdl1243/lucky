  ["11. 정의", "⚖️", "공정함과 균형의 카드예요. 뿌린 대로 거두는 시기이니 정직하게 임하면 저울이 당신 쪽으로 기웁니다.", "한쪽으로 치우친 판단을 하고 있지는 않나요? 결정을 내리기 전에 반대편 이야기도 들어보세요."],

  ["16. 탑", "🗼", "갑작스러운 변화의 카드예요. 흔들림이 있더라도 무너지는 것은 낡은 껍데기일 뿐, 더 단단한 토대를 쌓을 기회가 됩니다.", "큰 위기를 아슬아슬하게 비껴가는 중이에요. 경고 신호를 무시하지 말고 미리 점검하면 탈이 없습니다."],

  ["19. 태양", "☀️", "성공, 활력, 순수한 기쁨의 카드! 하는 일마다 밝은 기운이 함께합니다. 자신 있게 웃으며 나아가세요.", "구름이 잠시 해를 가렸을 뿐이에요. 성과가 조금 늦어져도 결국 밝게 빛날 결과가 기다립니다."],

  ["21. 세계", "🌍", "완성과 성취의 카드! 긴 여정이 결실을 맺고 축하할 일이 생깁니다. 다음 무대는 더 넓은 세계예요.", "마무리 직전에 멈춰 있어요. 마지막 한 조각만 채우면 완성입니다. 끝까지 해내는 힘을 발휘하세요."]
];

const POS3 = ["🕰️ 과거", "🌟 현재", "🔭 미래"];
let mode = 1, deck = [], picked = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function setMode(m) {
  mode = m;
  document.getElementById("mode1").classList.toggle("sel", m === 1);
  document.getElementById("mode3").classList.toggle("sel", m === 3);
  reset();
}

function reset() {
  picked = 0;
  deck = shuffle(ARCANA.map((c, i) => ({ card: c, rev: Math.random() < 0.3 })));
  document.getElementById("guide").textContent =
    mode === 1
      ? "질문을 떠올리며 가장 끌리는 카드 한 장을 골라주세요."
      : "세 장을 차례로 골라주세요. 과거 → 현재 → 미래 순서로 읽어드립니다.";
  document.getElementById("reading").innerHTML = "";
  document.getElementById("res").classList.remove("show");

  const el = document.getElementById("deck");
  el.innerHTML = "";
  deck.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "tcard";
    div.innerHTML =
      '<div class="inner">' +
        '<div class="face back">✦</div>' +
        '<div class="face front' + (d.rev ? " rev" : "") + '">' +
          '<span class="em">' + d.card[1] + "</span>" +
          '<span class="nm">' + d.card[0].replace(/^\d+\.\s*/, "") + "</span>" +
        "</div>" +
      "</div>";
    div.onclick = () => pick(div, i);
    el.appendChild(div);
  });
}

function pick(div, i) {
  if (picked >= mode || div.classList.contains("flipped")) return;
  div.classList.add("flipped");
  picked++;

  const d = deck[i];
  const posLabel = mode === 3 ? POS3[picked - 1] : "🌟 오늘의 카드";
  const dirLabel = d.rev ? "역방향" : "정방향";
  const meaning = d.rev ? d.card[3] : d.card[2];

  document.getElementById("reading").innerHTML +=
    '<div class="one">' +
      '<div class="pos">' + posLabel + "</div>" +
      '<div class="title">' + d.card[1] + " " + d.card[0] +
        '<span class="dir">(' + dirLabel + ")</span></div>" +
      "<p>" + meaning + "</p>" +
    "</div>";

  if (picked === mode) {
    document.querySelectorAll(".tcard:not(.flipped)").forEach(c => c.classList.add("dimmed"));
    setTimeout(() => {
      const res = document.getElementById("res");
      res.classList.add("show");
      res.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 700);
  }
}

reset();
</script>
