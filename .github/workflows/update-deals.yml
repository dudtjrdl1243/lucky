name: 오늘의 특가 자동 갱신

on:
  schedule:
    - cron: "10 22 * * *" # 매일 KST 07:10
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 골드박스 데이터 갱신
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
        run: python scripts/update_deals.py

      - name: 텔레그램 특가 포스팅 (설정 시)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/post_telegram.py

      - name: 변경사항 커밋
        run: |
          git config user.name "deals-bot"
          git config user.email "actions@users.noreply.github.com"
          git add deals-data.js
          git diff --cached --quiet || git commit -m "오늘의 특가 자동 갱신 $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          git push
