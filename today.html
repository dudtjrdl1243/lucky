// 문자열 → 시드 (같은 입력이면 항상 같은 결과)
function hashSeed(str) {
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return h >>> 0;
}
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const PLACES = ["창가 자리", "동네 카페", "서점", "공원 벤치", "물가 근처", "높은 곳", "익숙한 골목", "새로 생긴 가게"];

function tell() {
  const name = document.getElementById("nm").value.trim();
  const bd = document.getElementById("bd").value;
  if (!name && !bd) { alert("이름이나 생년월일 중 하나는 입력해 주세요!"); return; }
  if (bd && !isValidBirth(bd)) { alert("생년월일을 확인해 주세요! 예) 19840825"); return; }

  const today = new Date();
  const dateStr = today.getFullYear() + "-" + (today.getMonth() + 1) + "-" + today.getDate();
  const rng = mulberry32(hashSeed(dateStr + "|" + name + "|" + bd));

  const score = 60 + Math.floor(rng() * 41); // 60~100
  document.getElementById("score").textContent = score + "점";
  document.getElementById("scoreMsg").textContent = SCORE_MSGS.find(t => score >= t[0])[1];
  document.getElementById("resTitle").textContent =
    "🌙 " + (name || "당신") + "님의 " + (today.getMonth() + 1) + "월 " + today.getDate() + "일 운세";

  let html = "";
  for (const cat in POOLS) {
    const stars = 2 + Math.floor(rng() * 4); // 2~5
    const msg = POOLS[cat][Math.floor(rng() * POOLS[cat].length)];
    html += '<div class="score-row"><span class="cat">' + cat + '</span>' +
            '<span class="stars">' + "★".repeat(stars) + "☆".repeat(5 - stars) + "</span></div>" +
            '<p class="fortune-msg">' + msg + "</p>";
  }
  document.getElementById("rows").innerHTML = html;

  document.getElementById("lkColor").textContent = COLORS[Math.floor(rng() * COLORS.length)];
  document.getElementById("lkNum").textContent = 1 + Math.floor(rng() * 45);
  const luckyItem = ITEMS[Math.floor(rng() * ITEMS.length)];
  document.getElementById("lkItem").textContent = luckyItem;
  document.getElementById("lkTime").textContent = TIMES[Math.floor(rng() * TIMES.length)];
  document.getElementById("lkDir").textContent = DIRS[Math.floor(rng() * DIRS.length)];
  document.getElementById("lkPlace").textContent = PLACES[Math.floor(rng() * PLACES.length)];
  renderLuckyShop("luckyShop", LUCKY_PRODUCTS[luckyItem]);

  window.SHARE_TEXT = "🔮 " + (name || "나") + "의 오늘 운세 " + score + "점! 행운의 아이템은 '" + luckyItem + "' — 너도 무료로 확인해봐";

  const res = document.getElementById("res");
  res.classList.add("show");
  res.scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>
</body>
</html>
